name: CI

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Type-check & Build (apps/web + apps/admin)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check apps/web
        run: cd apps/web && pnpm type-check

      - name: Type-check apps/admin
        run: cd apps/admin && pnpm type-check

      - name: Build apps/web
        run: cd apps/web && pnpm build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Build apps/admin
        run: cd apps/admin && pnpm build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Notify Discord on failure
        if: failure() && github.event_name == 'pull_request'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          BRANCH: ${{ github.head_ref }}
          SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg pr "$PR_TITLE" \
              --arg pr_url "$PR_URL" \
              --arg branch "$BRANCH" \
              --arg sha "${SHA:0:7}" \
              --arg run_url "$RUN_URL" \
              '{
                embeds: [{
                  title: "❌ CI Falhou",
                  description: "**PR:** [\($pr)](\($pr_url))\n**Branch:** `\($branch)`\n**Commit:** `\($sha)`\n**Logs:** [\($run_url)](\($run_url))",
                  color: 15158332,
                  footer: { text: "Noun CI" }
                }]
              }')"
